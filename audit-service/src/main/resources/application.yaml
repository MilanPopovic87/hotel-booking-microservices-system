spring:
  application:
    name: audit-service

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/audit_db}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:1234}
    driver-class-name: org.postgresql.Driver

    hikari:
      initialization-fail-timeout: 60000

  jpa:
    hibernate:
      ddl-auto: create
    show-sql: true
    properties:
      hibernate:
        format_sql: true

server:
  port: ${SERVER_PORT:8083}


