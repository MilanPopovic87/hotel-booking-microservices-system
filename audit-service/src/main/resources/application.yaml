spring:
  application:
    name: audit-service

  datasource:
    url: jdbc:postgresql://localhost:5432/audit_db
    username: postgres
    password: 1234
    driver-class-name: org.postgresql.Driver

    hikari:
      initialization-fail-timeout: 60000

  jpa:
    hibernate:
      ddl-auto: create
    show-sql: true
    properties:
      hibernate:
        format_sql: true

server:
  port: 8083


