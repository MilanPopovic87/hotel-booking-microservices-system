apiVersion: v1
kind: ConfigMap
metadata:
  name: api-gateway-config

data:
  USER_SERVICE_URL: {{ .Values.apiGateway.userServiceUrl | quote }}

  BOOKING_SERVICE_URL: {{ .Values.apiGateway.bookingServiceUrl | quote }}

  AI_CHAT_SERVICE_URL: {{ .Values.apiGateway.aiChatServiceUrl | quote }}

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway

spec:
  replicas: {{ .Values.apiGateway.replicas }}

  selector:
    matchLabels:
      app: api-gateway

  template:
    metadata:
      labels:
        app: api-gateway

    spec:
      containers:
        - name: api-gateway

          image: {{ .Values.apiGateway.image }}
          imagePullPolicy: Never

          ports:
            - containerPort: {{ .Values.apiGateway.serverPort }}

          envFrom:
            - configMapRef:
                name: api-gateway-config

          env:
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: app-secret
                  key: JWT_SECRET

---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway

spec:
  selector:
    app: api-gateway

  type: ClusterIP

  ports:
    - port: {{ .Values.apiGateway.serverPort }}
      targetPort: {{ .Values.apiGateway.serverPort }}
