apiVersion: v1
kind: Service

metadata:
  name: kafka-ui

spec:
  selector:
    app: kafka-ui

  type: ClusterIP

  ports:
    - port: 8080
      targetPort: 8080

---
apiVersion: apps/v1
kind: Deployment

metadata:
  name: kafka-ui

spec:
  replicas: 1

  selector:
    matchLabels:
      app: kafka-ui

  template:
    metadata:
      labels:
        app: kafka-ui

    spec:
      containers:
        - name: kafka-ui

          image: {{ .Values.kafkaUi.image }}

          ports:
            - containerPort: 8080

          env:
            - name: KAFKA_CLUSTERS_0_NAME
              value: {{ .Values.kafkaUi.clusterName | quote }}

            - name: KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS
              value: {{ .Values.kafkaUi.bootstrapServers | quote }}
