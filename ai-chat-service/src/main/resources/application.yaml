spring:
  application:
    name: ai-chat-service

  ai:
    ollama:
      base-url: ${OLLAMA_URL:http://localhost:11434}

      chat:
        options:
          model: ${OLLAMA_MODEL:qwen3:4b}
          temperature: ${OLLAMA_TEMPERATURE:0.2}

server:
  port: ${SERVER_PORT:8084}

services:
  booking:
    url: ${BOOKING_SERVICE_URL:http://localhost:8082}

  user:
    url: ${USER_SERVICE_URL:http://localhost:8081}

  audit:
    url: ${AUDIT_SERVICE_URL:http://localhost:8083}