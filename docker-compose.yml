services:

  postgres:
    image: postgres:16
    container_name: hotel-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 1234
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - hotel-net

  kafka:
    image: apache/kafka:4.1.1
    container_name: kafka
    restart: unless-stopped
    environment:
      KAFKA_ENABLE_KRAFT: yes
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
    networks:
      - hotel-net

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-ui
    restart: unless-stopped
    ports:
      - "8085:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
    depends_on:
      - kafka
    networks:
      - hotel-net

  user-service:
    build:
      context: ./user-service
    container_name: user-service
    restart: unless-stopped
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/userservice_db
      DB_USERNAME: postgres
      DB_PASSWORD: 1234
      BOOKING_SERVICE_URL: http://booking-service:8082
      AUDIT_SERVICE_URL: http://audit-service:8083
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    depends_on:
      - postgres
    networks:
      - hotel-net

  booking-service:
    build:
      context: ./booking-service
    container_name: booking-service
    restart: unless-stopped
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/booking_db
      DB_USERNAME: postgres
      DB_PASSWORD: 1234
      USER_SERVICE_URL: http://user-service:8081
      AUDIT_SERVICE_URL: http://audit-service:8083
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    depends_on:
      - postgres
    networks:
      - hotel-net

  audit-service:
    build:
      context: ./audit-service
    container_name: audit-service
    restart: unless-stopped
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/audit_db
      DB_USERNAME: postgres
      DB_PASSWORD: 1234
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    depends_on:
      - postgres
    networks:
      - hotel-net

  ollama:
    image: ollama/ollama
    container_name: ollama
    restart: unless-stopped
    volumes:
      - ollama-data:/root/.ollama
    networks:
      - hotel-net
    profiles: ["ai"]

  ollama-init:
    image: curlimages/curl:8.5.0
    depends_on:
      - ollama
    networks:
      - hotel-net
    profiles: ["ai"]
    restart: "no"
    volumes:
      - ./ollama-init.sh:/ollama-init.sh
    environment:
      OLLAMA_MODEL: qwen3:4b
    entrypoint: ["/bin/sh", "/ollama-init.sh"]

  ai-chat-service:
    build:
      context: ./ai-chat-service
    container_name: ai-chat-service
    restart: unless-stopped
    environment:
      OLLAMA_URL: http://ollama:11434
      OLLAMA_MODEL: qwen3:4b
      BOOKING_SERVICE_URL: http://booking-service:8082
      USER_SERVICE_URL: http://user-service:8081
      AUDIT_SERVICE_URL: http://audit-service:8083
    depends_on:
      - ollama
    networks:
      - hotel-net
    profiles: ["ai"]

  api-gateway:
    build:
      context: ./api-gateway
    container_name: api-gateway
    restart: unless-stopped
    environment:
      USER_SERVICE_URL: http://user-service:8081
      BOOKING_SERVICE_URL: http://booking-service:8082
      AI_CHAT_SERVICE_URL: http://ai-chat-service:8084
    depends_on:
      - user-service
      - booking-service
    ports:
      - "8080:8080"
    networks:
      - hotel-net

  frontend:
    build:
      context: ./frontend
    container_name: frontend
    restart: unless-stopped
    depends_on:
      - api-gateway
    ports:
      - "3000:80"
    networks:
      - hotel-net

networks:
  hotel-net:

volumes:
  postgres-data:
  ollama-data:
