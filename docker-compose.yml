services:

  postgres:
    image: postgres:16
    container_name: hotel-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 1234
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - hotel-net

  user-service:
    build:
      context: ./user-service
    container_name: user-service
    restart: unless-stopped
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/userservice_db
      DB_USERNAME: postgres
      DB_PASSWORD: 1234
      BOOKING_SERVICE_URL: http://booking-service:8082
      AUDIT_SERVICE_URL: http://audit-service:8083
    depends_on:
      - postgres
    networks:
      - hotel-net

  booking-service:
    build:
      context: ./booking-service
    container_name: booking-service
    restart: unless-stopped
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/booking_db
      DB_USERNAME: postgres
      DB_PASSWORD: 1234
      USER_SERVICE_URL: http://user-service:8081
      AUDIT_SERVICE_URL: http://audit-service:8083
    depends_on:
      - postgres
    networks:
      - hotel-net

  audit-service:
    build:
      context: ./audit-service
    container_name: audit-service
    restart: unless-stopped
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/audit_db
      DB_USERNAME: postgres
      DB_PASSWORD: 1234
    depends_on:
      - postgres
    networks:
      - hotel-net

  ollama:
    image: ollama/ollama
    container_name: ollama
    restart: unless-stopped
    volumes:
      - ollama-data:/root/.ollama
    networks:
      - hotel-net
    profiles: ["ai"]

  ollama-init:
    image: curlimages/curl:8.5.0
    depends_on:
      - ollama
    networks:
      - hotel-net
    profiles: ["ai"]
    restart: "no"
    volumes:
      - ./ollama-init.sh:/ollama-init.sh
    environment:
      OLLAMA_MODEL: qwen3:4b
    entrypoint: ["/bin/sh", "/ollama-init.sh"]

  ai-chat-service:
    build:
      context: ./ai-chat-service
    container_name: ai-chat-service
    restart: unless-stopped
    environment:
      OLLAMA_URL: http://ollama:11434
      OLLAMA_MODEL: qwen3:4b
      BOOKING_SERVICE_URL: http://booking-service:8082
      USER_SERVICE_URL: http://user-service:8081
      AUDIT_SERVICE_URL: http://audit-service:8083
    depends_on:
      - ollama
    networks:
      - hotel-net
    profiles: ["ai"]

  api-gateway:
    build:
      context: ./api-gateway
    container_name: api-gateway
    restart: unless-stopped
    environment:
      USER_SERVICE_URL: http://user-service:8081
      BOOKING_SERVICE_URL: http://booking-service:8082
      AI_CHAT_SERVICE_URL: http://ai-chat-service:8084
    depends_on:
      - user-service
      - booking-service
      - ai-chat-service
    ports:
      - "8080:8080"
    networks:
      - hotel-net

  frontend:
    build:
      context: ./frontend
    container_name: frontend
    restart: unless-stopped
    depends_on:
      - api-gateway
    ports:
      - "3000:80"
    networks:
      - hotel-net

networks:
  hotel-net:

volumes:
  postgres-data:
  ollama-data:

