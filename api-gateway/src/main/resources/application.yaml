spring:
  cloud:
    gateway:
      server:
        webflux:
          routes:

            - id: user-service
              uri: ${USER_SERVICE_URL:http://localhost:8081}
              predicates:
                - Path=/api/users/**

            - id: auth-service
              uri: ${USER_SERVICE_URL:http://localhost:8081}
              predicates:
                - Path=/api/auth/**

            - id: booking-service
              uri: ${BOOKING_SERVICE_URL:http://localhost:8082}
              predicates:
                - Path=/api/bookings/**

            - id: room-service
              uri: ${BOOKING_SERVICE_URL:http://localhost:8082}
              predicates:
                - Path=/api/rooms/**

            - id: ai-chat-service
              uri: ${AI_CHAT_SERVICE_URL:http://localhost:8084}
              predicates:
                - Path=/api/chat/**

jwt:
  secret: ${JWT_SECRET:YourSuperSecretKeyAtLeast32CharsLong123!}
  expirationMinutes: ${JWT_EXPIRATION_MINUTES:60}
